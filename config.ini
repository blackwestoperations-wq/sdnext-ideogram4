[default]
# weak  → allows git URL installs, pip installs, and all manager features
# other options: strong | normal | weak | disable
security_level = weak

# Logging
file_logging = false

# Network
request_timeout = 60
channel_url = https://raw.githubusercontent.com/ltdrdata/ComfyUI-Manager/main

# Snapshot / update behaviour
nodes_snapshot_interval = 24
skip_update_check = false

# UI defaults
default_ui = none
component_policy = workflow
double_click_edit_node = true
share_option = all
