name: comfyui

services:
  - name: comfyui
    type: web

    # ── Build (Koyeb builds from your Git repo) ──────────────────────────
    git:
      repository: github.com/YOUR_ORG/YOUR_REPO   # ← replace
      branch: main
      build_command: ""   # leave empty; Koyeb auto-detects Dockerfile

    # ── Runtime ──────────────────────────────────────────────────────────
    ports:
      - port: 8188
        protocol: http

    routes:
      - path: /
        port: 8188

    # ── Environment variables ────────────────────────────────────────────
    env:
      - key: ALLOW_GIT_URL_INSTALL
        value: "1"
      # Uncomment to pre-load a model from a URL at startup:
      # - key: MODEL_URL
      #   value: "https://huggingface.co/..."

    # ── Instance (GPU required for inference) ────────────────────────────
    instance_type: gpu-nvidia-rtx4000-sff   # Koyeb smallest GPU tier

    # ── Health check ─────────────────────────────────────────────────────
    health_checks:
      - type: http
        port: 8188
        path: /
        initial_delay_seconds: 60   # ComfyUI needs time to start
        period_seconds: 30
        success_threshold: 1
        failure_threshold: 5

    # ── Scaling ───────────────────────────────────────────────────────────
    scaling:
      min: 1
      max: 1   # GPU services are typically single-instance
